apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: dev
  labels:
    app: orders
spec:
  replicas: 0
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: 303670280087.dkr.ecr.us-east-1.amazonaws.com/orders:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: dev
spec:
  selector:
    app: orders
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
